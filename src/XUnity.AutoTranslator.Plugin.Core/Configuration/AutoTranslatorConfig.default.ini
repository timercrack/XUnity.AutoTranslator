[Service]
Endpoint=LLMTranslate
FallbackEndpoint=

[General]
Language=zh
FromLanguage=en

[Files]
Directory=Translation\{Lang}\Text
OutputFile=Translation\{Lang}\Text\_AutoGeneratedTranslations.txt
SubstitutionFile=Translation\{Lang}\Text\_Substitutions.txt
PreprocessorsFile=Translation\{Lang}\Text\_Preprocessors.txt
PostprocessorsFile=Translation\{Lang}\Text\_Postprocessors.txt

[TextFrameworks]
EnableIMGUI=True
EnableUGUI=True
EnableUIElements=True
EnableNGUI=True
EnableTextMeshPro=True
EnableTextMesh=True
EnableFairyGUI=True

[Behaviour]
MaxCharactersPerTranslation=2500
IgnoreWhitespaceInDialogue=False
MinDialogueChars=20
ForceSplitTextAfterCharacters=0
CopyToClipboard=False
MaxClipboardCopyCharacters=2500
ClipboardDebounceTime=1.25
EnableUIResizing=True
EnableBatching=True
UseStaticTranslations=True
OverrideFont=
OverrideFontSize=
OverrideFontTextMeshPro=zh=chinesefont;ru=arialuni_sdf_u6000
FallbackFontTextMeshPro=
ResizeUILineSpacingScale=
ForceUIResizing=False
IgnoreTextStartingWith=Age:;C:;D:;E:;F:;G:;UTC;Mass:;Condition:
IgnoreTextRegexes=^\s*[xX]\d+\s*$
TextGetterCompatibilityMode=False
WhitelistPaths=
BlacklistPaths=
GameLogTextPaths=/Canvas Stack/Canvas Crew Bar/GUICrewStatus/pnlMessageScroll;/Canvas Stack/Canvas Tooltip Compact/ItemList;/OffscreenDraw/CanvasDockSysDraw;/OffscreenDraw/CanvasATCDraw;/Canvas Stack/Canvas Objectives;/Canvas Stack/Canvas Helmet/bmpHelmet/pnlHUD;/Canvas Stack/Canvas GUI
IgnoreStabilizationPaths=/Canvas Info(Clone)/Offset
RomajiPostProcessing=ReplaceMacronWithCircumflex;RemoveApostrophes;ReplaceHtmlEntities
TranslationPostProcessing=ReplaceMacronWithCircumflex;ReplaceHtmlEntities
RegexPostProcessing=
CacheRegexPatternResults=False
PersistRichTextMode=Final
CacheRegexLookups=False
CacheWhitespaceDifferences=False
GenerateStaticSubstitutionTranslations=False
GeneratePartialTranslations=False
EnableTranslationScoping=True
EnableSilentMode=True
BlacklistedIMGUIPlugins=
EnableTextPathLogging=True
EnableUIPathInspector=False
TextPathLoggingIgnoredPaths=
PeriodicManualHookIntervalSeconds=1.0
OutputUntranslatableText=False
IgnoreVirtualTextSetterCallingRules=False
MaxTextParserRecursion=1
HtmlEntityPreprocessing=True
HandleRichText=True
EnableTranslationHelper=False
ForceMonoModHooks=False
InitializeHarmonyDetourBridge=False
RedirectedResourceDetectionStrategy=AppendMongolianVowelSeparatorAndRemoveAll
OutputTooLongText=False
TemplateAllNumberAway=True
ReloadTranslationsOnFileChange=False
DisableTextMeshProScrollInEffects=True
CacheParsedTranslations=False

[Texture]
TextureDirectory=Translation\{Lang}\Texture
EnableTextureTranslation=False
EnableTextureDumping=False
EnableTextureToggling=False
EnableTextureScanOnSceneLoad=False
EnableSpriteRendererHooking=False
LoadUnmodifiedTextures=False
DetectDuplicateTextureNames=False
DuplicateTextureNames=
EnableLegacyTextureLoading=False
TextureHashGenerationStrategy=FromImageName
CacheTexturesInMemory=True
EnableSpriteHooking=False

[ResourceRedirector]
PreferredStoragePath=Translation\{Lang}\RedirectedResources
EnableTextAssetRedirector=False
LogAllLoadedResources=False
EnableDumping=False
CacheMetadataForAllFiles=True

[Http]
UserAgent=
DisableCertificateValidation=True

[TranslationAggregator]
Width=542
Height=300
EnabledTranslators=

[Debug]
EnableConsole=False

[Migrations]
Enable=True
Tag=5.6.1

[LLMTranslate]
Url=https://api.deepseek.com/chat/completions
ApiKey=
Model=deepseek-v4-flash
SystemPrompt=You are a dedicated translator for game UI text. The input is a JSON array of strings. Translate each array element into {DestinationLanguageName}. Return exactly one valid JSON array with the same number of elements and the same order as the input. Output only the JSON array. Do not output markdown, code fences, comments, explanations, or any extra text. Preserve escape sequences such as \n, \r, and \t exactly as they appear. Preserve placeholders and markup such as <...> exactly. Keep personal names translated or transliterated consistently into {DestinationLanguageName}, unless the text is a hotkey, single-letter label, ID, serial number, or obvious technical identifier.
SystemPrompt_zh=你是Ostranauts（星际漂流者）的专用翻译器。输入是一个JSON数组，数组中的每个元素都是一个待翻译字符串。你的任务是返回一个JSON数组，元素数量、顺序必须与输入完全一致，每个元素都是对应的简体中文译文字符串。你必须严格遵守以下规则：1. 只能输出一个合法的JSON数组。2. 输出内容的第一个字符必须是[，最后一个字符必须是]。3. 除这个JSON数组外，禁止输出任何其他内容。4. 禁止输出Markdown。5. 禁止输出代码块。6. 禁止输出任何围栏标记或语言标识，例如```或```json。7. 禁止输出说明、注释、前缀、后缀、标题、提示语、空行、自然语言解释。8. 数组中的每个元素都必须是合法JSON字符串；若译文中出现双引号，必须按JSON规则转义。9. 必须原样保留每个字符串中的转义符及其位置，包括\n、\r、\t，不得新增、删除、移动、合并或拆分。10. <...>中的内容视为特殊标记，必须逐字保留，不翻译、不改写。11. 默认把人物姓名音译/翻译为简体中文，并且同一名字在不同条目里必须保持一致；像 Camila Oluwakemi Graves 这类人名不要原样保留英文。只有单个字母、快捷键、明显代号、注册号、纯ID或明确不应翻译的技术标识保留原文。12. 不要合并、拆分、补全、重排或省略任何数组元素。13. 如果某一项无法确定含义，可以保留原文，但仍然只能输出合法JSON数组。唯一允许的输出形式是：["译文1","译文2"]。
SystemPrompt_ru=你是Ostranauts（星际漂流者）的专用翻译器。输入是一个JSON数组，数组中的每个元素都是一个待翻译字符串。你的任务是返回一个JSON数组，元素数量、顺序必须与输入完全一致，每个元素都是对应的俄文译文字符串。你必须严格遵守以下规则：1. 只能输出一个合法的JSON数组。2. 输出内容的第一个字符必须是[，最后一个字符必须是]。3. 除这个JSON数组外，禁止输出任何其他内容。4. 禁止输出Markdown。5. 禁止输出代码块。6. 禁止输出任何围栏标记或语言标识，例如```或```json。7. 禁止输出说明、注释、前缀、后缀、标题、提示语、空行、自然语言解释。8. 数组中的每个元素都必须是合法JSON字符串；若译文中出现双引号，必须按JSON规则转义。9. 必须原样保留每个字符串中的转义符及其位置，包括\n、\r、\t，不得新增、删除、移动、合并或拆分。10. <...>中的内容视为特殊标记，必须逐字保留，不翻译、不改写。11. 默认把人物姓名音译/翻译为俄文，并且同一名字在不同条目里必须保持一致；像 Camila Oluwakemi Graves 这类人名不要原样保留英文。只有单个字母、快捷键、明显代号、注册号、纯ID或明确不应翻译的技术标识保留原文。12. 不要合并、拆分、补全、重排或省略任何数组元素。13. 如果某一项无法确定含义，可以保留原文，但仍然只能输出合法JSON数组。唯一允许的输出形式是：["перевод1","перевод2"]。
Temperature=0.2
MaxTokens=8192
BatchSize=100
MaxConcurrency=1
EnableShortDelay=False
DisableSpamChecks=False

[Custom]
Url=
EnableShortDelay=False
DisableSpamChecks=False
BatchSize=1
MaxConcurrency=1
